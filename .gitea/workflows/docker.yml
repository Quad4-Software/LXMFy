name: Build and Publish Docker Image

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

env:
  REGISTRY: git.quad4.io
  IMAGE_NAME: LXMFy/LXMFy

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_digest: ${{ steps.build.outputs.digest }}
      image_tags: ${{ steps.meta.outputs.tags }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744  # v3

      - name: Set up QEMU
        uses: docker/setup-qemu-action@29109295f81e9208d7d86ff1c6c12d2833863392  # v3
        with:
          platforms: amd64,arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@e468171a9de216ec08956ac3ada2f0791b6bd435  # v3

      - name: Log in to the Container registry
        uses: docker/login-action@184bdaa0721073962dff0199f1fb9940f07167d1  # v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@c1e51972afc2121e065aed6d45c65596fe445f3f  # v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch,prefix=,suffix=,enable={{is_default_branch}}
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,format=short

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@ca052bb54ab0790a636c9b5f226502c73d547a25  # v5
        with:
          context: .
          file: docker/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: false

  provenance:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744  # v3
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Collect dependency lock digests
        env:
          LOCK_PATHS: |
            poetry.lock
            pyproject.toml
          OUTPUT_JSONL: provenance/locks.jsonl
        working-directory: ${{ github.workspace }}
        run: bash "${{ github.workspace }}/.gitea/scripts/provenance_collect_locks.sh"

      - name: Build provenance document
        env:
          SUBJECT: docker-image
          SOURCE_REF: ${{ github.ref }}
          COMMIT_SHA: ${{ github.sha }}
          IMAGE_DIGEST: ${{ needs.build.outputs.image_digest }}
          IMAGE_TAGS: ${{ needs.build.outputs.image_tags }}
          ARTIFACT_JSONL: provenance/artifacts.jsonl
          LOCK_JSONL: provenance/locks.jsonl
          OUTPUT_PATH: provenance/provenance.json
        working-directory: ${{ github.workspace }}
        run: python "${{ github.workspace }}/.gitea/scripts/provenance_build.py"

      - name: Optional sign provenance with GPG
        if: ${{ secrets.PROVENANCE_PRIVATE_KEY != '' }}
        env:
          PROVENANCE_PRIVATE_KEY: ${{ secrets.PROVENANCE_PRIVATE_KEY }}
          PROVENANCE_PRIVATE_KEY_PASSPHRASE: ${{ secrets.PROVENANCE_PRIVATE_KEY_PASSPHRASE }}
          PROVENANCE_PATH: provenance/provenance.json
        working-directory: ${{ github.workspace }}
        run: bash "${{ github.workspace }}/.gitea/scripts/provenance_sign.sh"

      - name: Upload provenance
        uses: actions/upload-artifact@ff15f0306b3f739f7b6fd43fb5d26cd321bd4de5  # v3
        with:
          name: provenance
          path: provenance/