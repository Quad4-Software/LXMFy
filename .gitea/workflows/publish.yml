  gitea-release:
    name: Sign the Python distribution and create Gitea Draft Release
    needs:
    - build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Download all the dists
      uses: actions/download-artifact@9bc31d5ccc31df68ecc42ccf4149144866c47d8a  # v3
      with:
        name: python-package-distributions
        path: dist/
    - name: Sign the dists with Sigstore
      uses: sigstore/gh-action-sigstore-python@f514d46b907ebcd5bedc05145c03b69c1edd8b46  # v3.0.0
      with:
        inputs: >-
          ./dist/*.tar.gz
          ./dist/*.whl
    - name: Create Gitea Draft Release
      env:
        GITEA_TOKEN: ${{ github.token }}
        GITEA_API: https://git.quad4.io/api/v1
        REPO: LXMFy/LXMFy
        TAG: ${{ github.ref_name }}
      run: bash .gitea/scripts/gitea_create_release.sh

    - name: Upload artifact signatures to Gitea Draft Release
      env:
        GITEA_TOKEN: ${{ github.token }}
        GITEA_API: https://git.quad4.io/api/v1
        REPO: LXMFy/LXMFy
        RELEASE_ID: ${{ env.RELEASE_ID }}
        ASSET_PATHS: |
          dist/*.tar.gz
          dist/*.whl
          dist/*.tar.gz.asc
          dist/*.whl.asc
          dist/*.tar.gz.sigstore
          dist/*.whl.sigstore
      run: bash .gitea/scripts/gitea_upload_assets.sh

  provenance:
    needs:
    - build
    uses: ./.gitea/workflows/provenance.yml
    with:
      subject: python-package
      source-ref: ${{ github.ref }}
      commit-sha: ${{ github.sha }}
      artifact-name: python-package-distributions
      artifact-paths: |
        dist/*.tar.gz
        dist/*.whl
      lock-paths: |
        poetry.lock
        pyproject.toml
    secrets: inherit
